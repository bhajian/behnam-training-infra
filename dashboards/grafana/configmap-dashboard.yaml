apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dcgm-dashboard
  namespace: monitoring-system
data:
  dcgm-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "GPU Utilization (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [{
            "expr": "DCGM_FI_DEV_GPU_UTIL{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"}",
            "legendFormat": "{{exported_pod}} gpu={{gpu}}"
          }]
        },
        {
          "title": "GPU Memory Used (MiB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": { "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [{
            "expr": "DCGM_FI_DEV_FB_USED{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"}",
            "legendFormat": "{{exported_pod}} gpu={{gpu}}"
          }]
        },
        {
          "title": "Tensor Core Active (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [{
            "expr": "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"}",
            "legendFormat": "{{exported_pod}} gpu={{gpu}}"
          }]
        },
        {
          "title": "Memory Copy Utilization (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [{
            "expr": "DCGM_FI_DEV_MEM_COPY_UTIL{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"}",
            "legendFormat": "{{exported_pod}} gpu={{gpu}}"
          }]
        },
        {
          "title": "GPU Temperature (C)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              }
            }
          },
          "targets": [{
            "expr": "DCGM_FI_DEV_GPU_TEMP{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"}",
            "legendFormat": "{{exported_pod}} gpu={{gpu}}"
          }]
        },
        {
          "title": "Power Usage (W)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": { "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [{
            "expr": "DCGM_FI_DEV_POWER_USAGE{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"}",
            "legendFormat": "{{exported_pod}} gpu={{gpu}}"
          }]
        },
        {
          "title": "SM Clock (MHz)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "clockHz",
              "custom": { "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [{
            "expr": "DCGM_FI_DEV_SM_CLOCK{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"}",
            "legendFormat": "{{exported_pod}} gpu={{gpu}}"
          }]
        },
        {
          "title": "PCIe Throughput (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_PCIE_TX_THROUGHPUT{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"} * 1024",
              "legendFormat": "TX {{exported_pod}} gpu={{gpu}}"
            },
            {
              "expr": "DCGM_FI_DEV_PCIE_RX_THROUGHPUT{gpu=~\"$gpu\", exported_pod=~\"$pod\", hpc_job=~\"$hpc_job\"} * 1024",
              "legendFormat": "RX {{exported_pod}} gpu={{gpu}}"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "name": "DS_VICTORIAMETRICS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "VictoriaMetrics", "value": "VictoriaMetrics" },
            "hide": 2
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
            "query": "label_values(DCGM_FI_DEV_GPU_UTIL, exported_pod)",
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "refresh": 2,
            "sort": 1
          },
          {
            "name": "gpu",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
            "query": "label_values(DCGM_FI_DEV_GPU_UTIL, gpu)",
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "refresh": 2,
            "sort": 3
          },
          {
            "name": "hpc_job",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_VICTORIAMETRICS}" },
            "query": "label_values(DCGM_FI_DEV_GPU_UTIL{hpc_job!=\"\"}, hpc_job)",
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "refresh": 2,
            "sort": 3
          }
        ]
      },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "DCGM GPU Metrics",
      "uid": "dcgm-gpu-metrics",
      "version": 1
    }
