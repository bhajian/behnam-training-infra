apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring-system
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://vmsingle-metrics-victoria-metrics-k8s-stack.monitoring-system.svc.cluster.local:8429
        isDefault: true
        editable: true
