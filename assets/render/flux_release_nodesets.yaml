nodesets:
  enabled: true

  interval: 5m
  timeout: 5m
  version: 3.0.3
  namespace: soperator
  releaseName: soperator-nodesets

  overrideValues: 
    nodesets:
      - name: worker
        annotations:
          slurm.nebius.ai/parental-cluster-ref: soperator

        replicas: 2
        maxUnavailable: 20%

        gpu:
          enabled: true
          nvidia:
            gdrCopyEnabled: false

        nodeConfig:
          features:
            - gpu_l40s_d
            - network_ssd
          static: "CPUs=16 Boards=1 SocketsPerBoard=1 CoresPerSocket=8 ThreadsPerCore=2 Gres=gpu:nvidia_l40s:1"
          dynamic: "\"{ \\\"ib_pod\\\": \\\"$TOPO_SWITCH_TIER2\\\" }\""
          gresConfig:
            - AutoDetect=off Name=gpu Type=nvidia_l40s File=/dev/nvidia0 Flags=nvidia_gpu_env

        slurmd:
          resources:
            cpu: 15000m
            memory: 84Gi
            ephemeralStorage: 387Gi
            gpu: 1

          volumes:
            spool:
              emptyDir: {}

            jail:
              persistentVolumeClaim:
                claimName: jail-pvc
                readOnly: false

            jailSubMounts:

              - name: home-dir
                mountPath: /home
                volumeSource:
                  persistentVolumeClaim:
                    claimName: home-dir

              - name: data
                mountPath: /mnt/data
                volumeSource:
                  persistentVolumeClaim:
                    claimName: jail-submount-data-pvc
                    readOnly: false

              - name: local-data
                mountPath: /mnt/local-data
                volumeClaimTemplateSpec:
                  accessModes:
                    - ReadWriteOnce
                  storageClassName: compute-csi-network-ssd-ext4
                  resources:
                    requests:
                      storage: 1024Gi


              - name: image-storage
                mountPath: /mnt/image-storage
                volumeClaimTemplateSpec:
                  accessModes:
                    - ReadWriteOnce
                  storageClassName: compute-csi-network-ssd-io-m3-ext4
                  resources:
                    requests:
                      storage: 930Gi

            customVolumeMounts:
              - name: slurm-scripts
                mountPath: /opt/slurm_scripts/
                volumeSource:
                  configMap:
                    name: slurm-scripts
                    defaultMode: 500

              - name: slurm-scripts-jail
                mountPath: /mnt/jail.upper/opt/slurm_scripts/
                volumeSource:
                  configMap:
                    name: slurm-scripts
                    defaultMode: 500

              - name: sys-host
                mountPath: /mnt/jail.upper/sys-host
                readOnly: true
                volumeSource:
                  hostPath:
                    path: /sys
                    type: Directory

              - name: enroot-on-image-storage
                mountPath: /etc/enroot/enroot.conf.d/custom-dirs.conf
                subPath: enroot.conf
                readOnly: true
                volumeSource:
                  configMap:
                    name: image-storage
                    defaultMode: 500

              - name: docker-on-image-storage
                mountPath: /etc/docker/daemon.json
                subPath: daemon.json
                readOnly: true
                volumeSource:
                  configMap:
                    name: image-storage
                    defaultMode: 500

              - name: hpc-jobs-dir
                mountPath: /var/run/nebius/slurm
                volumeSource:
                  hostPath:
                    path: /var/run/nebius/slurm
                    type: DirectoryOrCreate

              - name: nvidia-driver-root
                mountPath: /run/nvidia/driver
                readOnly: false
                volumeSource:
                  hostPath:
                    path: /
                    type: ""

            sharedMemorySize: 1024Gi

          security:
            appArmorProfile: unconfined

        munge:
          resources:
            cpu: 100m
            memory: 0.5Gi
            ephemeralStorage: 5Gi

          security:
            appArmorProfile: unconfined

        configMapRefSupervisord: custom-supervisord-config
        configMapRefSshd: 

        enableHostUserNamespace: true

        priorityClass: soperator-worker-high-priority
        nodeSelector:
          slurm.nebius.ai/nodeset-name: worker
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule

        customInitContainers:
          - name: ensure-jail-virtiofs
            image: cr.eu-north1.nebius.cloud/soperator/busybox
            volumeMounts: [{ name: jail, mountPath: /volume-mount }]
            command: ["grep", " /volume-mount virtiofs ", "/proc/mounts"]

          - name: ensure-jail-submount-data-virtiofs
            image: cr.eu-north1.nebius.cloud/soperator/busybox
            volumeMounts: [{ name: 'data', mountPath: /volume-mount }]
            command: ["grep", " /volume-mount virtiofs ", "/proc/mounts"]

          - name: ensure-node-local-jail-submount-local-data-ext4
            image: cr.eu-north1.nebius.cloud/soperator/busybox
            volumeMounts: [{ name: 'local-data', mountPath: /volume-mount }]
            command: ["grep", ' /volume-mount ext4 ', "/proc/mounts"]


          - name: ensure-node-local-image-storage-ext4
            image: cr.eu-north1.nebius.cloud/soperator/busybox
            volumeMounts: [{ name: 'image-storage', mountPath: /volume-mount }]
            command: ["grep", ' /volume-mount ext4 ', "/proc/mounts"]

          - name: prepare-node-local-image-storage
            image: cr.eu-north1.nebius.cloud/soperator/busybox
            volumeMounts: [{ name: 'image-storage', mountPath: /volume-mount }]
            command:
            - "sh"
            - "-c"
            - |
              mkdir -p \
                /volume-mount/enroot/cache \
                /volume-mount/enroot/data \
                /volume-mount/enroot/runtime \
                /volume-mount/docker \
              && chmod 777 -R /volume-mount/enroot /volume-mount/docker
